name: Generate Showcase

on:
  schedule:
    # 05:00 JST (20:00 UTC previous day)
    - cron: '0 20 * * *'
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'scripts/generate-showcase.mjs'
      - '.github/workflows/showcase.yml'
      - 'scripts/featured.json'

permissions:
  contents: write

concurrency:
  group: showcase
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate showcase SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-showcase.mjs
      - name: Commit changes
        run: |
          git config user.name "Vaishnav-Sabari-Girish"
          git config user.email "vaishnav.sabari.girish@gmail.com"
          git add README.md showcase-*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update project showcase"
            git push
          fi
